# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate browser config from secrets
        env:
          AI_PROVIDER: gemini
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3-flash-preview
          GEMINI_IMAGE_MODEL: gemini-3-pro-image
          GEMINI_IMAGE_SIZE: 2K
          GEMINI_IMAGE_ASPECT: 3:4
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          # Real Firebase + Gemini config required for custom-domain sync / admin AI
          node scripts/sync-firebase-config.mjs
          node scripts/sync-ai-config.mjs
          node -e "
            const fs = require('fs');
            const fb = fs.readFileSync('firebase-config.js', 'utf8');
            if (!/\"apiKey\"\\s*:\\s*\"[^\"]+\"/.test(fb) || /\"apiKey\"\\s*:\\s*\"\"/.test(fb)) {
              console.error('firebase-config.js is missing apiKey — refusing broken deploy.');
              process.exit(1);
            }
            const ai = fs.readFileSync('ai-config.js', 'utf8');
            const g = (ai.match(/\"geminiApiKey\"\\s*:\\s*\"([^\"]*)\"/) || [])[1] || '';
            const o = (ai.match(/\"openaiApiKey\"\\s*:\\s*\"([^\"]*)\"/) || [])[1] || '';
            if (g.length < 8 && o.length < 8) {
              console.error('ai-config.js is missing API keys — refusing broken deploy.');
              process.exit(1);
            }
            console.log('firebase-config.js + ai-config.js OK');
          "
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prune unused heavy assets from deploy
        run: |
          rm -f images/hero-bg.jpeg images/hero-bg.webp images/hero-bg.png
          rm -f storefront-full-bundle.txt md3-hero-stickers.js
          echo "Pruned unused deploy bloat"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
